<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Icare HMIS</title>
    <meta name="description" content="Lovable Generated Project" />
    <meta name="author" content="Lovable" />

    <style media="print">
      /* ── generic chrome hiding ────────────────────────────────────────────── */
      body > * { display: none !important; }

      /* ── show the receipt tile (it's in a portal inside the print call path) ─ */
      /* The receipt is rendered inside a Dialog in the normal DOM tree;
         when window.print() is called we keep only the tile content. */
      body { background: white !important; }

      /* ── fine-print KRA render for thermal / receipt printers ─────────────── */
      @page { margin: 0; size: 80mm auto; }

      /* ── receipt proof (tile width ≈ 80 mm for standard receipt printers) ─── */
      body :is([role="dialog"], aside, .sale-receipt) {
        display: block !important;
        position: absolute;
        left: 0;
        top: 0;
        width: 80mm;
        font-family: "Courier New", Courier, monospace;
        font-size: 10pt;
        color: black;
        background: white;
        padding: 4mm;
      }
    </style>


  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
